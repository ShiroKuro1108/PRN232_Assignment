<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Clothing Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="showHome()">Clothing Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showHome()">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showAddProduct()">Add Product</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Home Page -->
        <div id="homePage">
            <div class="row mb-4">
                <div class="col-md-6">
                    <h1>Welcome to Our Clothing Store</h1>
                    <p class="lead">Discover the latest fashion trends and quality clothing.</p>
                </div>
                <div class="col-md-6">
                    <div class="d-flex justify-content-end">
                        <button class="btn btn-primary" onclick="showAddProduct()">Add New Product</button>
                    </div>
                </div>
            </div>

            <!-- Search and Filter -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search products..." onkeyup="searchProducts()">
                </div>
                <div class="col-md-6">
                    <select id="sortSelect" class="form-select" onchange="sortProducts()">
                        <option value="">Sort by...</option>
                        <option value="name">Name</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="productsContainer" class="row">
                <!-- Products will be loaded here -->
            </div>
        </div>

        <!-- Product Detail Page -->
        <div id="productDetailPage" style="display: none;">
            <button class="btn btn-secondary mb-3" onclick="showHome()">← Back to Products</button>
            <div id="productDetailContent">
                <!-- Product details will be loaded here -->
            </div>
        </div>

        <!-- Add/Edit Product Page -->
        <div id="addProductPage" style="display: none;">
            <button class="btn btn-secondary mb-3" onclick="showHome()">← Back to Products</button>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h3 id="formTitle">Add New Product</h3>
                        </div>
                        <div class="card-body">
                            <form id="productForm">
                                <input type="hidden" id="productId">
                                <div class="mb-3">
                                    <label for="productName" class="form-label">Product Name *</label>
                                    <input type="text" class="form-control" id="productName" required maxlength="100">
                                </div>
                                <div class="mb-3">
                                    <label for="productDescription" class="form-label">Description *</label>
                                    <textarea class="form-control" id="productDescription" rows="4" required maxlength="1000"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="productPrice" class="form-label">Price ($) *</label>
                                    <input type="number" class="form-control" id="productPrice" step="0.01" min="0.01" required>
                                </div>
                                <div class="mb-3">
                                    <label for="productImage" class="form-label">Image URL</label>
                                    <input type="url" class="form-control" id="productImage" maxlength="500">
                                </div>
                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <button type="button" class="btn btn-secondary" onclick="showHome()">Cancel</button>
                                    <button type="submit" class="btn btn-primary" id="submitBtn">Add Product</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="text-center" style="display: none;">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
