services:
  - type: web
    name: ecommerce-api
    env: dotnet
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/assignment.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        value: # Add your Supabase connection string here
    healthCheckPath: /api/products
